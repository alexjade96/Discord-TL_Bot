[pytest]
testpaths =
    Translation/1-Text/tests
    Translation/2-Image/tests
    Translation/3-Audio/tests
    Translation/4-Video/tests
    Prompt/tests
norecursedirs = .venv __pycache__ .git Translation/0-Data
addopts = --import-mode=importlib
markers =
    integration: end-to-end tests that call real APIs and/or use real assets (require HF_TOKEN)
